<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mac Controller</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>

<body>
    <div class="container">
        <div class="card">
            <div class="header">
                <div class="icon-wrapper">
                    <svg class="volume-icon" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                        <rect x="2" y="3" width="20" height="14" rx="2" stroke="currentColor" stroke-width="2" />
                        <rect x="8" y="17" width="8" height="4" rx="1" stroke="currentColor" stroke-width="2" />
                        <line x1="6" y1="21" x2="18" y2="21" stroke="currentColor" stroke-width="2"
                            stroke-linecap="round" />
                    </svg>
                </div>
                <h1>Mac Controller</h1>
                <p class="subtitle">Remote PC Management</p>
                <button class="theme-toggle" id="themeToggle" aria-label="Toggle dark mode">
                    <svg class="sun-icon" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                        <circle cx="12" cy="12" r="4" stroke="currentColor" stroke-width="2" />
                        <path
                            d="M12 2v2m0 16v2M4.93 4.93l1.41 1.41m11.32 11.32l1.41 1.41M2 12h2m16 0h2M4.93 19.07l1.41-1.41m11.32-11.32l1.41-1.41"
                            stroke="currentColor" stroke-width="2" stroke-linecap="round" />
                    </svg>
                    <svg class="moon-icon" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                        <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z" stroke="currentColor" stroke-width="2"
                            stroke-linecap="round" stroke-linejoin="round" />
                    </svg>
                </button>
            </div>

            <div class="tabs-nav" id="tabsNav">
                <button class="tab-btn active" data-tab="touchpad">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="tab-icon">
                        <rect x="2" y="3" width="20" height="14" rx="2" />
                        <line x1="8" y1="21" x2="16" y2="21" />
                        <line x1="12" y1="17" x2="12" y2="21" />
                    </svg>
                    <span>Touchpad</span>
                </button>
                <button class="tab-btn" data-tab="watch">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="tab-icon">
                        <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z" />
                        <circle cx="12" cy="12" r="3" />
                    </svg>
                    <span>Watch</span>
                </button>
                <button class="tab-btn" data-tab="controls">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="tab-icon">
                        <circle cx="12" cy="12" r="3" />
                        <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z" />
                    </svg>
                    <span>Controls</span>
                </button>
            </div>

            <!-- TAB 1: Touchpad & Screen Stream -->
            <div id="tab-touchpad" class="tab-content active">
                <div class="toggle-container">
                    <span class="toggle-label">Live Screen Stream</span>
                    <div class="toggle-right">
                        <select id="resolutionSelect" class="resolution-select">
                            <option value="320p">320p</option>
                            <option value="480p">480p</option>
                            <option value="720p" selected>720p</option>
                        </select>
                        <label class="switch">
                            <input type="checkbox" id="screenToggle">
                            <span class="slider round"></span>
                        </label>
                    </div>
                </div>

                <div class="touchpad-section" id="touchpadSection">
                    <div class="touchpad" id="touchpad">
                        <img id="screenStream" class="screen-stream-img hidden" alt="Screen stream">
                        <div id="remoteCursor" class="remote-cursor hidden"></div>
                        <button id="fullscreenBtn" class="floating-fullscreen-btn" aria-label="Toggle fullscreen">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                <path d="M8 3H5a2 2 0 0 0-2 2v3m18 0V5a2 2 0 0 0-2-2h-3m0 18h3a2 2 0 0 0 2-2v-3M3 16v3a2 2 0 0 0 2 2h3"/>
                            </svg>
                        </button>
                        <button id="exitFullscreenBtn" class="exit-fullscreen-btn hidden" aria-label="Exit fullscreen">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                <path d="M18 6L6 18M6 6l12 12"/>
                            </svg>
                        </button>
                        <div class="touchpad-hint">Drag to move • Tap to click • 2-finger drag to scroll</div>
                    </div>
                </div>
            </div>

            <!-- TAB 2: Watch Mode (View-only + Audio) -->
            <div id="tab-watch" class="tab-content">
                <div class="watch-controls">
                    <select id="watchResolutionSelect" class="resolution-select">
                        <option value="320p">320p</option>
                        <option value="480p">480p</option>
                        <option value="720p" selected>720p</option>
                    </select>
                    <button id="watchFullscreenBtn" class="watch-fullscreen-btn" aria-label="Fullscreen">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M8 3H5a2 2 0 0 0-2 2v3m18 0V5a2 2 0 0 0-2-2h-3m0 18h3a2 2 0 0 0 2-2v-3M3 16v3a2 2 0 0 0 2 2h3"/>
                        </svg>
                    </button>
                </div>
                <div class="watch-container" id="watchContainer">
                    <img id="watchStream" class="watch-stream-img" alt="Watch stream">
                    <div class="watch-placeholder" id="watchPlaceholder">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" width="48" height="48">
                            <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z" />
                            <circle cx="12" cy="12" r="3" />
                        </svg>
                        <p>Switch to this tab to start watching</p>
                    </div>
                    <button id="watchExitFullscreenBtn" class="exit-fullscreen-btn hidden" aria-label="Exit fullscreen">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M18 6L6 18M6 6l12 12"/>
                        </svg>
                    </button>
                    <div class="watch-audio-indicator" id="watchAudioIndicator">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="16" height="16">
                            <path d="M11 5L6 9H2v6h4l5 4V5z"/>
                            <path d="M19.07 4.93a10 10 0 0 1 0 14.14M15.54 8.46a5 5 0 0 1 0 7.07"/>
                        </svg>
                        <span>Audio</span>
                    </div>
                </div>
            </div>

            <!-- TAB 2: Audio, D-Pad, Keys -->
            <div id="tab-controls" class="tab-content">
                <div class="volume-section">
                    <div class="volume-header">
                        <div class="volume-label">System Volume</div>
                        <div class="volume-number" id="volumeDisplay">50</div>
                    </div>
                    <div class="slider-container">
                        <input type="range" min="0" max="100" value="50" class="volume-slider" id="volumeSlider">
                        <div class="slider-track-fill" id="sliderFill"></div>
                    </div>
                </div>



                <div class="arrow-controls">
                    <div class="arrow-row">
                        <button class="arrow-btn" id="arrowUp" data-key="ArrowUp" aria-label="Arrow Up">
                            <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                                <path d="M12 19V5M12 5L5 12M12 5L19 12" stroke="currentColor" stroke-width="2"
                                    stroke-linecap="round" stroke-linejoin="round" />
                            </svg>
                        </button>
                    </div>
                    <div class="arrow-row">
                        <button class="arrow-btn" id="arrowLeft" data-key="ArrowLeft" aria-label="Arrow Left">
                            <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                                <path d="M19 12H5M5 12L12 19M5 12L12 5" stroke="currentColor" stroke-width="2"
                                    stroke-linecap="round" stroke-linejoin="round" />
                            </svg>
                        </button>
                        <button class="arrow-btn" id="arrowDown" data-key="ArrowDown" aria-label="Arrow Down">
                            <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                                <path d="M12 5V19M12 19L19 12M12 19L5 12" stroke="currentColor" stroke-width="2"
                                    stroke-linecap="round" stroke-linejoin="round" />
                            </svg>
                        </button>
                        <button class="arrow-btn" id="arrowRight" data-key="ArrowRight" aria-label="Arrow Right">
                            <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                                <path d="M5 12H19M19 12L12 5M19 12L12 19" stroke="currentColor" stroke-width="2"
                                    stroke-linecap="round" stroke-linejoin="round" />
                            </svg>
                        </button>
                    </div>
                </div>

                <div class="controls-grid">
                    <button class="control-btn" id="muteBtn">
                        <svg class="btn-icon" id="muteIcon" viewBox="0 0 24 24" fill="none"
                            xmlns="http://www.w3.org/2000/svg">
                            <path d="M11 5L6 9H2V15H6L11 19V5Z" stroke="currentColor" stroke-width="2"
                                stroke-linecap="round" stroke-linejoin="round" />
                            <path d="M23 9L17 15M17 9L23 15" stroke="currentColor" stroke-width="2" stroke-linecap="round"
                                stroke-linejoin="round" />
                        </svg>
                        <span id="muteBtnText">Mute</span>
                    </button>

                    <button class="control-btn secondary" id="keyboardBtn" aria-label="Open keyboard">
                        <svg class="btn-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <rect x="2" y="4" width="20" height="16" rx="2"/>
                            <path d="M6 8h.01M10 8h.01M14 8h.01M18 8h.01M6 12h.01M18 12h.01M7 16h10M10 12h4"/>
                        </svg>
                        <span>Keyboard</span>
                    </button>

                    <button class="control-btn secondary" id="refreshBtn">
                        <svg class="btn-icon" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                            <path d="M1 4V10H7" stroke="currentColor" stroke-width="2" stroke-linecap="round"
                                stroke-linejoin="round" />
                            <path d="M23 20V14H17" stroke="currentColor" stroke-width="2" stroke-linecap="round"
                                stroke-linejoin="round" />
                            <path
                                d="M20.49 9C19.9828 7.56678 19.1209 6.28536 17.9845 5.27542C16.8482 4.26548 15.4745 3.55976 13.9917 3.22426C12.5089 2.88875 10.9652 2.93434 9.50481 3.35677C8.04437 3.77921 6.71475 4.56471 5.64 5.64L1 10M23 14L18.36 18.36C17.2853 19.4353 15.9556 20.2208 14.4952 20.6432C13.0348 21.0657 11.4911 21.1112 10.0083 20.7757C8.52547 20.4402 7.1518 19.7345 6.01547 18.7246C4.87913 17.7146 4.01717 16.4332 3.51 15"
                                stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" />
                        </svg>
                        <span>Refresh</span>
                    </button>
                </div>
            </div>

            <div class="bottom-bar">
                <div class="status" id="status">
                    <div class="status-dot"></div>
                    <span>Connected</span>
                </div>
                <button class="lock-bar-btn" id="lockBtn" aria-label="Lock screen">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="lock-icon-small">
                        <rect x="3" y="11" width="18" height="11" rx="2" />
                        <path d="M7 11V7a5 5 0 0 1 10 0v4" />
                    </svg>
                </button>
            </div>

            <textarea id="hiddenInput" style="position: absolute; left: -9999px; top: -9999px; opacity: 0; pointer-events: none;" autocomplete="off" autocorrect="off" autocapitalize="off" spellcheck="false"></textarea>

            <div class="lock-screen hidden" id="lockScreen">
                <div class="lock-icon-large">
                    <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                        <rect x="3" y="11" width="18" height="11" rx="2" stroke="currentColor" stroke-width="2" />
                        <path d="M7 11V7a5 5 0 0 1 10 0v4" stroke="currentColor" stroke-width="2" />
                    </svg>
                </div>
                <div class="unlock-slider-container">
                    <div class="unlock-track">
                        <div class="unlock-text">Slide to unlock</div>
                        <div class="unlock-thumb" id="unlockThumb">
                            <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                                <path d="M9 18l6-6-6-6" stroke="currentColor" stroke-width="2" stroke-linecap="round"
                                    stroke-linejoin="round" />
                            </svg>
                        </div>
                    </div>
                </div>
            </div>

            <div class="pin-screen" id="pinScreen">
                <div class="pin-content">
                    <div class="lock-icon-large">
                        <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                            <path
                                d="M12 22C17.5228 22 22 17.5228 22 12C22 6.47715 17.5228 2 12 2C6.47715 2 2 6.47715 2 12C2 17.5228 6.47715 22 12 22Z"
                                stroke="currentColor" stroke-width="2" />
                            <path d="M12 16V12" stroke="currentColor" stroke-width="2" stroke-linecap="round" />
                            <circle cx="12" cy="8" r="1" fill="currentColor" />
                        </svg>
                    </div>
                    <h2>Enter PIN</h2>
                    <p class="pin-hint">Check the server terminal for the PIN</p>
                    <div class="pin-input-container">
                        <input type="text" id="pinInput" pattern="\d*" placeholder="PIN"
                            autocomplete="off">
                        <button id="connectBtn" class="control-btn">Connect</button>
                    </div>
                    <p class="pin-error hidden" id="pinError">Invalid PIN</p>
                </div>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>

</html>
